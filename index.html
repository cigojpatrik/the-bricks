<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Bricks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Space defense</p>
        <h1>Galaxy Bricks</h1>
        <p>Move the spaceship: ← → or A / D · Pause: P</p>
      </div>
      <div class="hud">
        <div class="hud-item">
          <span class="label">LEVEL</span>
          <strong id="level">1</strong>
        </div>
        <div class="hud-item">
          <span class="label">SCORE</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-item">
          <span class="label">TIME</span>
          <strong id="timer">00:00</strong>
        </div>
        <div class="hud-item">
          <span class="label">STATUS</span>
          <strong id="status">Pripravljen</strong>
        </div>
      </div>
    </header>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="800" height="520" aria-label="Igra Galaxy Bricks"></canvas>
      <div id="overlay" class="overlay hidden">
        <h2 id="overlayTitle">Galaxy Bricks</h2>
        <p id="overlayText">Pritisni gumb za začetek igre.</p>
        <button id="restartBtn" type="button">Zaženi znova</button>
      </div>
    </section>

    <footer class="controls">
      <button id="startBtn" type="button">New Mission</button>
      <button id="pauseBtn" type="button">Pavza</button>
      <p>Odbij energijsko kroglo, razbij asteroidne bloke in počisti vse sektorje galaksije.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
