<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bricks Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Bricks Game</h1>
    <p class="navodilo">Premik: levo/desno puščica ali A/D • Začetek: presledek</p>

    <div class="info">
      <span>Točke: <strong id="score">0</strong></span>
      <span>Življenja: <strong id="lives">3</strong></span>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <p id="message">Pritisni presledek za začetek igre.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
