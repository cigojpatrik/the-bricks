<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>Galaxy Bricks</title>
	<link rel="icon" type="image/png" href="img/fav.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/jQuery.js"></script>
  <script src="js/script.js"></script>
</head>
<body onload="init()">
  <div class="container">
    <div class="game-header">
      <h1 class="naslov">Galaxy Bricks</h1>
      <p class="navodila">Premikaj ploscico z levo in desno puscico in pocisti vse bloke.</p>
	  <button id="startBtn" onclick="startGame()">Start</button>
	  <button id="resetBtn" onclick="resetGame()">Reset</button>
	  <button id="pauseBtn" onclick="togglePause()">Pause</button>
    </div>
    <div class="hud">
      <div class="kocke">
        <span class="hud-label">Level</span>
        <mark id="level">1</mark>
      </div>
      <div class="kocke">
        <span class="hud-label">Cas</span>
        <mark id="cas">00:00</mark>
      </div>
      <div class="kocke">
        <span class="hud-label">Tocke</span>
        <mark id="tocke">0</mark>
      </div>
    </div>
    <div >
      <canvas id="canvas" width="710" height="520"></canvas>
    </div>
  </div>
</body>
</html>
